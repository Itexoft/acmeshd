name: CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  workflow_call:
    outputs:
      run-id:
        description: ci run id
        value: ${{ github.run_id }}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build linux-x64
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Linux toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang lld

      - name: Build runtime
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          rid="linux-x64"
          publish_dir="artifacts/publish/$rid"
          release_dir="artifacts/release"
          rm -rf "$publish_dir" "$release_dir"
          mkdir -p "$publish_dir" "$release_dir"

          chmod +x ./build.sh
          ./build.sh "$rid" "$publish_dir"

          binary_name="acmeshd"
          if [[ ! -f "$publish_dir/$binary_name" ]]; then
            echo "::error::Publish output not found: $publish_dir/$binary_name"
            exit 1
          fi

          version="$(tr -d ' \t\r\n' < VERSION)"
          if [[ -z "$version" ]]; then
            echo "::error::VERSION file is empty"
            exit 1
          fi

          cp "$publish_dir/$binary_name" "$release_dir/acmeshd-$version-$rid"

      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: acmeshd-binaries
          path: artifacts/release/acmeshd-*
          if-no-files-found: error
          retention-days: 1
